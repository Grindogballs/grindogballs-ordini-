<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GB Ordini v4</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header><h1>🥩 Grindogballs Ordini</h1><div class="ver">v4.0 parser nuovo IT/DE · kg/pezzi · debug</div></header>
<div class="wrap">
<section id="home">
 <div class="card"><div class="title">📲 Importa da WhatsApp</div><label>Incolla messaggio cliente</label><textarea id="raw" placeholder="Esempio: Ciao sono Martina, 4 chili dolce 4 pezzi piccante per sabato 6 luglio alle 16"></textarea><button class="btn" onclick="analyze()">🤖 Analizza</button><button class="btn btn2" onclick="clearForm()">Pulisci</button><div id="parseInfo" class="debug"></div></div>
 <div class="card"><div class="title">➕ Nuovo ordine</div><label>Cliente</label><input id="cliente" placeholder="Nome cliente"><label>Telefono</label><input id="telefono" placeholder="Telefono">
 <div class="row"><div><label>Data ritiro</label><input id="data" type="date"></div><div><label>Ora</label><input id="ora" type="time"></div></div><label>Luogo</label><select id="luogo"><option>Wettingen</option><option>Würenlos</option><option>Catering</option></select>
 <label>Prodotti riconosciuti / ordine</label><textarea id="prodotti" placeholder="10 pz Dolce&#10;5 kg Finocchio"></textarea><div class="quick"><button onclick="addQuick('Dolce','pz')">+ Dolce</button><button onclick="addQuick('Piccante','pz')">+ Piccante</button><button onclick="addQuick('Finocchio','kg')">+ Finocchio kg</button><button onclick="addQuick('Gorgonzola','kg')">+ Gorgonzola kg</button></div>
 <label>Note</label><input id="note" placeholder="Note"><label>Pagamento</label><select id="pagato"><option>Da pagare</option><option>Pagato</option><option>Fattura</option></select><button class="btn" onclick="saveOrder()">💾 Salva ordine</button></div>
</section>
<section id="orders" class="hide"><div class="card"><div class="title">📦 Ordini</div><input id="search" placeholder="Cerca cliente/prodotto" oninput="renderOrders()"><button class="btn btn2" onclick="setTodayFilter('today')">Oggi</button><button class="btn btn2" onclick="setTodayFilter('tomorrow')">Domani</button><button class="btn btn2" onclick="setTodayFilter('all')">Tutti</button></div><div id="ordersList"></div></section>
<section id="prod" class="hide"><div class="card"><div class="title">🥩 Produzione</div><label>Data</label><input id="prodDate" type="date" onchange="renderProduction()"><div id="prodList"></div></div></section>
<section id="clients" class="hide"><div class="card"><div class="title">👥 Clienti</div><div id="clientList"></div></div></section>
</div>
<nav class="tabs"><div class="tab active" onclick="show('home',this)"><b>➕</b>Ordine</div><div class="tab" onclick="show('orders',this)"><b>📦</b>Ordini</div><div class="tab" onclick="show('prod',this)"><b>🥩</b>Produzione</div><div class="tab" onclick="show('clients',this)"><b>👥</b>Clienti</div></nav>
<script src="catalogo.js"></script>
<script src="parser.js"></script>
<script src="app.js"></script>
</body></html>
