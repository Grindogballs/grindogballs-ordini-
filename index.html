<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>GB Ordini</title>
  <style>
    :root{--bg:#0d0d0f;--card:#17171a;--muted:#a9a9b2;--text:#fff;--orange:#ff7a00;--green:#31c26b;--red:#ff4d4d;--line:#2b2b31}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:env(safe-area-inset-top) 14px 80px}
    header{position:sticky;top:0;background:linear-gradient(#0d0d0f 80%,rgba(13,13,15,.8));z-index:5;padding:18px 0 12px} h1{font-size:24px;margin:0;font-weight:900;letter-spacing:.5px}.brand{color:var(--orange)}
    .tabs{display:flex;gap:8px;margin-top:14px;overflow:auto}.tab{border:1px solid var(--line);background:#121214;color:#fff;padding:10px 12px;border-radius:999px;font-weight:700;white-space:nowrap}.tab.active{background:var(--orange);border-color:var(--orange);color:#111}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 10px 30px rgba(0,0,0,.25)}
    label{display:block;font-size:13px;color:var(--muted);font-weight:700;margin:10px 0 6px} input,textarea,select{width:100%;background:#0f0f12;border:1px solid #34343b;color:#fff;border-radius:13px;padding:13px;font-size:16px;outline:none} textarea{min-height:110px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    button{border:0;border-radius:14px;padding:13px 14px;font-size:16px;font-weight:900;background:var(--orange);color:#111}.btn2{background:#29292f;color:#fff}.btnGreen{background:var(--green);color:#071}.btnRed{background:var(--red);color:#fff}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.small{font-size:13px;padding:9px 10px;border-radius:12px}.muted{color:var(--muted)}
    .order{border-left:5px solid var(--orange)}.order.preparato{border-left-color:#ffd23f}.order.consegnato{border-left-color:var(--green);opacity:.82}.order h3{margin:0 0 5px;font-size:19px}.meta{color:var(--muted);font-size:14px;margin:4px 0}.products{white-space:pre-wrap;line-height:1.45;margin:9px 0;font-size:16px}.badge{display:inline-block;border:1px solid #444;border-radius:999px;padding:5px 9px;font-size:12px;color:#ddd;margin-right:5px}.empty{text-align:center;color:var(--muted);padding:30px 10px}.totalLine{display:flex;justify-content:space-between;border-bottom:1px solid var(--line);padding:10px 0;font-size:17px}.totalLine b{color:var(--orange)}
    .hint{background:#21180f;border:1px solid #5d3a13;color:#ffd9b0;border-radius:14px;padding:10px;margin-top:10px;font-size:14px;line-height:1.35}.hide{display:none!important}
  </style>
</head>
<body>
<header><h1><span class="brand">GB</span> Ordini</h1><div class="muted">Gestionale Grindogballs · v2 parser</div><div class="tabs"><button class="tab active" data-tab="new">➕ Nuovo</button><button class="tab" data-tab="orders">📦 Ordini</button><button class="tab" data-tab="prod">🥩 Produzione</button></div></header>

<section id="new" class="screen">
  <div class="card">
    <label>Incolla messaggio WhatsApp / Mail</label>
    <textarea id="raw" placeholder="Esempio: Ciao Roberto, per venerdì 3 luglio ore 16:00\n10x dolce\n10x piccante\n10x finocchietto\n10x pizzaiola\nSaluti Walter"></textarea>
    <div class="actions"><button id="analyze">🤖 Analizza</button><button class="btn2" id="clearRaw">Pulisci</button></div>
    <div class="hint">Nuovo parser: legge più righe tipo <b>10x dolce</b>, <b>10 piccante</b>, italiano/tedesco, data, ora e nome in fondo tipo “Saluti Walter”.</div>
  </div>
  <div class="card">
    <input type="hidden" id="editingId">
    <label>Cliente</label><input id="cliente" placeholder="Nome cliente">
    <label>Telefono</label><input id="telefono" placeholder="Telefono">
    <div class="row"><div><label>Data</label><input id="data" type="date"></div><div><label>Ora</label><input id="ora" type="time"></div></div>
    <label>Luogo</label><select id="luogo"><option>Wettingen</option><option>Würenlos</option><option>Catering</option><option>Altro</option></select>
    <label>Ordine</label><textarea id="prodotti" placeholder="10x dolce&#10;10x piccante"></textarea>
    <label>Note</label><textarea id="note" style="min-height:70px" placeholder="Note"></textarea>
    <div class="row"><div><label>Stato</label><select id="stato"><option>Da preparare</option><option>Preparato</option><option>Consegnato</option></select></div><div><label>Pagamento</label><select id="pagato"><option>Da pagare</option><option>Pagato</option></select></div></div>
    <div class="actions"><button id="save">💾 Salva ordine</button><button class="btn2" id="reset">Nuovo vuoto</button></div>
  </div>
</section>

<section id="orders" class="screen hide">
  <div class="card"><div class="row"><input id="search" placeholder="Cerca cliente / prodotto"><select id="filter"><option value="all">Tutti</option><option value="today">Oggi</option><option value="tomorrow">Domani</option><option value="open">Da fare</option></select></div></div>
  <div id="ordersList"></div>
</section>

<section id="prod" class="screen hide"><div class="card"><label>Produzione per data</label><input id="prodDate" type="date"><div class="actions"><button id="calcProd">Calcola</button></div></div><div class="card" id="prodResults"></div></section>

<script>
const $=id=>document.getElementById(id); const storeKey='gb_orders_v2';
let orders=JSON.parse(localStorage.getItem(storeKey)||'[]');
const months={gennaio:0,jan:0,januar:0,febbraio:1,februar:1,marzo:2,märz:2,maerz:2,aprile:3,april:3,maggio:4,mai:4,giugno:5,juni:5,luglio:6,juli:6,agosto:7,august:7,settembre:8,september:8,ottobre:9,oktober:9,novembre:10,november:10,dicembre:11,dezember:11};
const weekdays={oggi:0,heute:0,domani:1,morgen:1,lunedi:1,lunedì:1,montag:1,martedi:2,martedì:2,dienstag:2,mercoledi:3,mercoledì:3,mittwoch:3,giovedi:4,giovedì:4,donnerstag:4,venerdi:5,venerdì:5,freitag:5,sabato:6,samstag:6,domenica:0,sonntag:0};
const productMap=[
 ['finocchio piccante',['finocchio piccante','finocchietto piccante','fenchel scharf']],['dolce',['dolce','classica','normale','mild','süss','suess']],['piccante',['piccante','scharf']],['finocchietto',['finocchietto','finocchio','fenchel']],['pizzaiola',['pizzaiola']],['aglio',['aglio','knoblauch']],['romana',['romana']],['gorgonzola',['gorgonzola']],['tartufo',['tartufo','trüffel','trueffel']],['texas twinkie',['texas','twinkie']],['contadina',['contadina']],['provola e parmigiano',['provola','parmigiano']],['rucola e grana',['rucola','grana']],['rib eye argentina',['rib eye argentina','ribeye argentina','argentina']],['rib eye irlanda',['rib eye irlanda','ribeye irlanda','irlanda','irland']],['rib eye svizzera',['rib eye svizzera','ribeye svizzera','svizzera','schweiz']],['fiorentina',['fiorentina']],['costata',['costata']],['hamburger',['hamburger','burger']]
];
function saveStore(){localStorage.setItem(storeKey,JSON.stringify(orders)); render();}
function iso(d){return d.toISOString().slice(0,10)}
function addDays(n){let d=new Date(); d.setDate(d.getDate()+n); return iso(d)}
function nextWeekday(target){let d=new Date(); let cur=d.getDay(); let diff=(target-cur+7)%7; if(diff===0) diff=7; d.setDate(d.getDate()+diff); return iso(d)}
function normalize(s){return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u');}
function canonicalProduct(text){let n=normalize(text); for(const [canon,syns] of productMap){ if(syns.some(x=>n.includes(normalize(x)))) return canon; } return text.trim();}
function parseMessage(txt){
 const res={cliente:'',telefono:'',data:'',ora:'',prodotti:[],note:''}; const lines=txt.split(/\n+/).map(l=>l.trim()).filter(Boolean); const all=' '+txt+' '; const low=normalize(all);
 let phone=all.match(/(\+?\d[\d\s]{6,}\d)/); if(phone) res.telefono=phone[1].trim();
 let time=all.match(/(?:ore|um|alle|ca\.?|circa)?\s*(\d{1,2})[:\.](\d{2})\s*(?:uhr)?/i); if(time) res.ora=String(time[1]).padStart(2,'0')+':'+time[2]; else {let t2=all.match(/(?:ore|um|alle)\s*(\d{1,2})\s*(?:uhr)?/i); if(t2) res.ora=String(t2[1]).padStart(2,'0')+':00';}
 let explicit=low.match(/\b(\d{1,2})[\.\/-]?\s*(gennaio|febbraio|marzo|aprile|maggio|giugno|luglio|agosto|settembre|ottobre|novembre|dicembre|januar|februar|marz|maerz|april|mai|juni|juli|august|september|oktober|november|dezember)\b/); if(explicit){let d=parseInt(explicit[1]); let m=months[explicit[2]]; let y=new Date().getFullYear(); res.data=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
 if(!res.data){ for(const [w,val] of Object.entries(weekdays)){ if(low.includes(w)){ res.data=(val===0 && (w==='oggi'||w==='heute'))?addDays(0):(val===1 && (w==='domani'||w==='morgen'))?addDays(1):nextWeekday(val); break; } } }
 let namePatterns=[/saluti\s+([A-ZÀ-Ü][A-Za-zÀ-ÿ' -]{1,30})/i,/gr[üu]sse\s+([A-ZÀ-Ü][A-Za-zÀ-ÿ' -]{1,30})/i,/gruss\s+([A-ZÀ-Ü][A-Za-zÀ-ÿ' -]{1,30})/i,/sono\s+([A-ZÀ-Ü][A-Za-zÀ-ÿ' -]{1,30})/i,/ich bin\s+([A-ZÀ-Ü][A-Za-zÀ-ÿ' -]{1,30})/i];
 for(const p of namePatterns){let m=txt.match(p); if(m){res.cliente=m[1].trim().replace(/[.,!].*$/,''); break;}}
 if(!res.cliente){let last=lines[lines.length-1]||''; if(/^[A-ZÀ-Ü][A-Za-zÀ-ÿ' -]{2,25}$/.test(last) && !/grazie|danke|saluti|grusse|grüße/i.test(last)) res.cliente=last;}
 const found=[];
 for(const line of lines){
   let n=normalize(line);
   let m=line.match(/(?:^|\s)(\d+(?:[\.,]\d+)?)\s*(?:x|×|stk|stuck|stück|pezzi|pz|kg|kilo)?\s+(.+)/i);
   if(m){ let qty=m[1].replace(',','.'); let rest=m[2].replace(/\b(per|für|fuer|venerdi|freitag|ore|um|uhr|alle|bitte|danke|grazie)\b.*$/i,'').trim(); let prod=canonicalProduct(rest); if(prod && !/luglio|juli|ore|uhr|saluti|grusse|grazie|danke/i.test(prod)) found.push(`${qty}x ${prod}`); continue; }
   // product before quantity: piccante 10x
   let m2=line.match(/(.+?)\s+(\d+(?:[\.,]\d+)?)\s*(?:x|×|stk|stuck|stück|pezzi|pz|kg|kilo)?\b/i);
   if(m2 && productMap.some(([c,s])=>s.some(x=>n.includes(normalize(x))))){found.push(`${m2[2].replace(',','.')}x ${canonicalProduct(m2[1])}`)}
 }
 // fallback scan all text for repeated patterns separated by comma
 const re=/(\d+(?:[\.,]\d+)?)\s*(?:x|×|stk|stuck|stück|pezzi|pz|kg|kilo)?\s+([a-zA-ZÀ-ÿ ]{3,35})/g; let mm;
 while((mm=re.exec(txt))){let prod=canonicalProduct(mm[2]); if(productMap.some(([c])=>c===prod) && !found.some(f=>f.includes(prod))) found.push(`${mm[1].replace(',','.')}x ${prod}`);}
 res.prodotti=[...new Set(found)]; return res;
}
function fillParsed(p){ if(p.cliente) $('cliente').value=p.cliente; if(p.telefono) $('telefono').value=p.telefono; if(p.data) $('data').value=p.data; if(p.ora) $('ora').value=p.ora; if(p.prodotti.length) $('prodotti').value=p.prodotti.join('\n'); }
$('analyze').onclick=()=>{fillParsed(parseMessage($('raw').value));}; $('clearRaw').onclick=()=>{$('raw').value=''};
function resetForm(){['editingId','cliente','telefono','ora','prodotti','note'].forEach(id=>$(id).value=''); $('data').value=iso(new Date()); $('luogo').value='Wettingen'; $('stato').value='Da preparare'; $('pagato').value='Da pagare';}
$('reset').onclick=resetForm; resetForm(); $('prodDate').value=iso(new Date());
$('save').onclick=()=>{let o={id:$('editingId').value||Date.now().toString(),cliente:$('cliente').value.trim()||'Senza nome',telefono:$('telefono').value.trim(),data:$('data').value,ora:$('ora').value,luogo:$('luogo').value,prodotti:$('prodotti').value.trim(),note:$('note').value.trim(),stato:$('stato').value,pagato:$('pagato').value,created:Date.now()}; let i=orders.findIndex(x=>x.id===o.id); if(i>=0) orders[i]=o; else orders.unshift(o); saveStore(); resetForm(); switchTab('orders');};
function switchTab(t){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hide')); $(t).classList.remove('hide'); document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t)); render();}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab)); $('search').oninput=render; $('filter').onchange=render;
function render(){let list=$('ordersList'); if(!list) return; let q=normalize($('search').value); let f=$('filter').value; let today=iso(new Date()), tomorrow=addDays(1); let arr=orders.filter(o=>{let txt=normalize(Object.values(o).join(' ')); if(q&&!txt.includes(q))return false; if(f==='today'&&o.data!==today)return false; if(f==='tomorrow'&&o.data!==tomorrow)return false; if(f==='open'&&o.stato==='Consegnato')return false; return true;}).sort((a,b)=>(a.data+a.ora).localeCompare(b.data+b.ora)); list.innerHTML=arr.length?arr.map(o=>`<div class="card order ${o.stato==='Preparato'?'preparato':o.stato==='Consegnato'?'consegnato':''}"><h3>${esc(o.cliente)}</h3><div class="meta">📅 ${o.data||'-'} ${o.ora||''} · 📍 ${o.luogo||''}</div><div class="products">${esc(o.prodotti)}</div><span class="badge">${o.stato}</span><span class="badge">${o.pagato}</span>${o.note?`<div class="meta">📝 ${esc(o.note)}</div>`:''}<div class="actions"><button class="small btn2" onclick="editOrder('${o.id}')">✏️ Modifica</button><button class="small" onclick="setStatus('${o.id}','Preparato')">✔ Preparato</button><button class="small btnGreen" onclick="setStatus('${o.id}','Consegnato')">🚚 Consegnato</button><button class="small btnRed" onclick="delOrder('${o.id}')">🗑</button></div></div>`).join(''):'<div class="empty">Nessun ordine</div>';}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
window.editOrder=id=>{let o=orders.find(x=>x.id===id); if(!o)return; ['cliente','telefono','data','ora','luogo','prodotti','note','stato','pagato'].forEach(k=>$(k).value=o[k]||''); $('editingId').value=o.id; switchTab('new');}
window.setStatus=(id,s)=>{let o=orders.find(x=>x.id===id); if(o){o.stato=s; saveStore();}}
window.delOrder=id=>{if(confirm('Eliminare ordine?')){orders=orders.filter(o=>o.id!==id); saveStore();}}
$('calcProd').onclick=()=>{let date=$('prodDate').value; let totals={}; orders.filter(o=>o.data===date).forEach(o=>{(o.prodotti||'').split(/\n|,/).forEach(line=>{let m=line.match(/(\d+(?:[\.,]\d+)?)\s*(?:x|kg)?\s*(.+)/i); if(m){let qty=parseFloat(m[1].replace(',','.')); let prod=canonicalProduct(m[2]); totals[prod]=(totals[prod]||0)+qty;}})}); let keys=Object.keys(totals).sort(); $('prodResults').innerHTML=keys.length?keys.map(k=>`<div class="totalLine"><span>${esc(k)}</span><b>${totals[k]} </b></div>`).join(''):'<div class="empty">Nessun prodotto per questa data</div>';};
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});} render();
</script>
</body>
</html>
